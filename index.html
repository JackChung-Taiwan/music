<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的青春音樂祭 🎵 - Anime JukeBox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* 動漫風粉嫩色調 */
            --anime-pink: #FFC0CB; /* 粉紅核心 */
            --anime-pink-dark: #FF9EBB; /* 暗粉紅 */
            --anime-cream: #FFF5F5; /* 奶油色背景 */
            --anime-accent: #80CBC4; /* 清新薄荷綠 */
            --anime-text: #4A4A4A;
            --shadow: 0 8px 16px rgba(255,192,203,0.3);
        }

        body {
            background-color: var(--anime-cream);
            color: var(--anime-text);
            font-family: 'Poppins', sans-serif, 'Microsoft JhengHei', 'メイリオ'; /* 圓潤字體 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 播放器主卡片 */
        .player-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 4px solid var(--anime-pink); /* 粉紅邊框 */
            position: relative;
        }

        /* 專輯圖片區域 (動漫角色或icon) */
        .album-art {
            width: 200px;
            height: 200px;
            background: #FFEBEB;
            margin: 0 auto 20px;
            border-radius: 50%; /* 圓形 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: var(--anime-pink);
            border: 6px solid white;
        }

        h2 { margin: 10px 0 5px 0; font-size: 1.4rem; color: #E91E63; }
        p { color: var(--anime-text); font-size: 0.95rem; margin-bottom: 25px; }

        /* 進度條容器 */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #F1F1F1;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 25px;
            position: relative;
        }
        
        /* 真實進度條 */
        .progress {
            height: 100%;
            background-color: var(--anime-pink-dark);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* 播放控制按鈕區域 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--anime-pink-dark);
            transition: 0.2s;
        }
        
        .ctrl-btn:hover {
            color: #E91E63;
            transform: scale(1.1);
        }

        .play-pause-btn {
            background-color: var(--anime-pink);
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(255,192,203,0.5);
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        
        .play-pause-btn:hover {
            background-color: var(--anime-pink-dark);
            transform: translateY(-2px);
        }

        /* 播放模式按鈕 (隨機/重複) */
        .mode-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            color: var(--anime-text);
        }

        .mode-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #ccc;
            transition: 0.2s;
        }
        
        .mode-btn.active {
            color: var(--anime-accent);
        }

        /* 播放清單區域 */
        .playlist {
            width: 100%;
            margin-top: 10px;
            text-align: left;
            border-top: 2px dashed var(--anime-pink);
            padding-top: 15px;
            max-height: 200px;
            overflow-y: auto; /* 超過高度可滾動 */
        }
        
        /* 訂製滾動條 */
        .playlist::-webkit-scrollbar { width: 5px; }
        .playlist::-webkit-scrollbar-thumb { background: var(--anime-pink); border-radius: 10px; }

        .track-item {
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            color: var(--anime-text);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .track-item:hover {
            background: #FFEBEB;
        }

        .track-item.active {
            background-color: var(--anime-pink);
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="album-art"><i class="fas fa-music"></i></div>
        <h2 id="currentTitle">選擇一首動漫金曲吧！</h2>
        <p id="currentArtist">動漫音樂祭 JukeBox</p>

        <audio id="mainAudio">
            <source id="audioSource" src="" type="audio/mpeg">
        </audio>

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="mode-controls">
            <button class="mode-btn" id="shuffleBtn" title="隨機播放"><i class="fas fa-random"></i></button>
            <button class="mode-btn" id="repeatBtn" title="重複播放模式"><i class="fas fa-redo"></i></button>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" title="上一首"><i class="fas fa-backward"></i></button>
            <button class="play-pause-btn" id="playPauseBtn" title="播放/暫停"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn" id="nextBtn" title="下一首"><i class="fas fa-forward"></i></button>
        </div>

        <div class="playlist" id="playlist">
            </div>
    </div>

    <script>
        // === 1. 設定你的音樂清單 (請確認音樂路徑是正確的！) ===
        // 建議結構：在根目錄建立 'music' 資料夾，檔案放在裡面
        const songList = [
            { title: '01. 我的青春之歌', artist: '動漫音樂祭', path: 'music/song1.mp3' }, // 確認這裡是你的檔名
            { title: '02. 魔法 소녀', artist: '動漫音樂祭', path: 'music/song2.mp3' },
            { title: '03. 結束 Band', artist: '結束樂團', path: 'music/song3.mp3' },
            // 你可以繼續加入更多歌曲：
            // { title: '04. 新歌名', artist: '歌手名', path: 'music/song4.mp3' },
        ];

        // === 2. 取得 DOM 元素 ===
        const audio = document.getElementById('mainAudio');
        const source = document.getElementById('audioSource');
        const playlistContainer = document.getElementById('playlist');
        const titleDisplay = document.getElementById('currentTitle');
        const artistDisplay = document.getElementById('currentArtist');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playPauseIcon = playPauseBtn.querySelector('i');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progress = document.getElementById('progress');
        const progressContainer = document.getElementById('progressContainer');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');

        // === 3. 初始化狀態 ===
        let currentSongIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0; // 0: 不重複, 1: 全部循環, 2: 單曲循環

        // === 4. 功能函數 ===

        // 初始化播放清單
        function initPlaylist() {
            songList.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.innerHTML = `<span>${song.title}</span>`;
                item.onclick = () => playSong(index);
                playlistContainer.appendChild(item);
            });
        }

        // 更新清單的高亮樣式
        function updatePlaylistHighlight() {
            const items = document.querySelectorAll('.track-item');
            items.forEach((item, index) => {
                if (index === currentSongIndex) {
                    item.classList.add('active');
                    // 自動滾動到當前播放的歌曲
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // 載入歌曲
        function loadSong(song) {
            source.src = song.path;
            titleDisplay.innerText = song.title;
            artistDisplay.innerText = song.artist;
            audio.load();
        }

        // 播放特定歌曲
        function playSong(index) {
            currentSongIndex = index;
            loadSong(songList[currentSongIndex]);
            updatePlaylistHighlight();
            playAudio();
        }

        // 播放按鈕處理
        function togglePlay() {
            if (source.src === "" || source.src.includes('music2/')) {
                // 如果是第一次使用，從第一首開始
                playSong(0);
                return;
            }
            if (isPlaying) {
                pauseAudio();
            } else {
                playAudio();
            }
        }

        function playAudio() {
            audio.play();
            isPlaying = true;
            playPauseIcon.className = 'fas fa-pause';
        }

        function pauseAudio() {
            audio.pause();
            isPlaying = false;
            playPauseIcon.className = 'fas fa-play';
        }

        // 上一首
        function prevSong() {
            currentSongIndex--;
            if (currentSongIndex < 0) {
                currentSongIndex = songList.length - 1;
            }
            playSong(currentSongIndex);
        }

        // 下一首
        function nextSong() {
            if (isShuffle) {
                // 隨機模式：選一首新的隨機歌曲
                playRandomSong();
            } else {
                // 順序模式
                currentSongIndex++;
                if (currentSongIndex > songList.length - 1) {
                    currentSongIndex = 0; // 回到第一首
                }
                playSong(currentSongIndex);
            }
        }

        // 播放隨機歌曲
        function playRandomSong() {
            let nextIndex = currentSongIndex;
            do {
                nextIndex = Math.floor(Math.random() * songList.length);
            } while (nextIndex === currentSongIndex); // 確保選到的不是當前播放的
            playSong(nextIndex);
        }

        // === 5. 進度條處理 ===
        function updateProgress(e) {
            const { duration, currentTime } = e.srcElement;
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;
        }

        function setProgress(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }

        // === 6. 播放模式處理 ===
        function toggleShuffle() {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active');
        }

        function cycleRepeatMode() {
            repeatMode = (repeatMode + 1) % 3; // 循環 0, 1, 2
            const icon = repeatBtn.querySelector('i');
            
            // 更新按鈕樣式與圖示
            switch (repeatMode) {
                case 0:
                    repeatBtn.classList.remove('active');
                    icon.className = 'fas fa-redo'; // 灰色redo
                    repeatBtn.title = '重複播放模式: 關閉';
                    break;
                case 1:
                    repeatBtn.classList.add('active');
                    icon.className = 'fas fa-redo-alt'; // 全部循環
                    repeatBtn.title = '重複播放模式: 全部循環';
                    break;
                case 2:
                    repeatBtn.classList.add('active');
                    icon.className = 'fas fa-history'; // 單曲循環 (FontAwesome歷史圖示適合當單曲循環)
                    repeatBtn.title = '重複播放模式: 單曲循環';
                    break;
            }
        }

        // 處理歌曲結束後的行為 (隨機/重複邏輯核心)
        function onAudioEnded() {
            if (repeatMode === 2) {
                // 單曲循環：從頭播放當前歌曲
                playAudio(); 
            } else if (isShuffle) {
                // 隨機播放
                playRandomSong();
            } else if (repeatMode === 1) {
                // 全部循環 (或順序播放到最後一首)
                nextSong();
            } else {
                // 不重複且非隨機，播完就暫停
                pauseAudio();
            }
        }

        // === 7. 事件監聽器 ===
        playPauseBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        audio.addEventListener('timeupdate', updateProgress);
        progressContainer.addEventListener('click', setProgress);
        audio.addEventListener('ended', onAudioEnded); // 處理音樂結束
        shuffleBtn.addEventListener('click', toggleShuffle);
        repeatBtn.addEventListener('click', cycleRepeatMode);

        // === 8. 啟動播放器 ===
        initPlaylist();
    </script>
</body>
</html>
