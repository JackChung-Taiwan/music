<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的青春音樂祭 🎵 - Anime JukeBox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

    <style>
        :root {
            --anime-pink: #FFC0CB;
            --anime-pink-dark: #FF9EBB;
            --anime-cream: #FFF5F5;
            --anime-accent: #80CBC4;
            --anime-text: #4A4A4A;
            --shadow: 0 8px 16px rgba(255,192,203,0.3);
        }

        body { background-color: var(--anime-cream); color: var(--anime-text); font-family: 'Poppins', sans-serif, 'Microsoft JhengHei'; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .player-card { background: white; padding: 25px; border-radius: 20px; width: 320px; text-align: center; box-shadow: var(--shadow); border: 4px solid var(--anime-pink); position: relative; }
        .album-art { width: 200px; height: 200px; background: #FFEBEB; margin: 0 auto 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 80px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: var(--anime-pink); border: 6px solid white; }
        h2 { margin: 10px 0 5px 0; font-size: 1.4rem; color: #E91E63; }
        p { color: var(--anime-text); font-size: 0.95rem; margin-bottom: 25px; }
        .progress-container { width: 100%; height: 6px; background: #F1F1F1; border-radius: 10px; cursor: pointer; margin-bottom: 25px; position: relative; }
        .progress { height: 100%; background-color: var(--anime-pink-dark); border-radius: 10px; width: 0%; transition: width 0.1s linear; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .ctrl-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--anime-pink-dark); transition: 0.2s; }
        .ctrl-btn:hover { color: #E91E63; transform: scale(1.1); }
        .play-pause-btn { background-color: var(--anime-pink); color: white; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; border: none; cursor: pointer; box-shadow: 0 4px 8px rgba(255,192,203,0.5); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .play-pause-btn:hover { background-color: var(--anime-pink-dark); transform: translateY(-2px); }
        .mode-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; color: var(--anime-text); }
        .mode-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #ccc; transition: 0.2s; }
        .mode-btn.active { color: var(--anime-accent); }
        .playlist { width: 100%; margin-top: 10px; text-align: left; border-top: 2px dashed var(--anime-pink); padding-top: 15px; max-height: 200px; overflow-y: auto; }
        .playlist::-webkit-scrollbar { width: 5px; }
        .playlist::-webkit-scrollbar-thumb { background: var(--anime-pink); border-radius: 10px; }
        .track-item { padding: 10px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; color: var(--anime-text); font-size: 0.9rem; margin-bottom: 5px; }
        .track-item:hover { background: #FFEBEB; }
        .track-item.active { background-color: var(--anime-pink); color: white; font-weight: bold; }
        .status-text { font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="album-art"><i class="fas fa-music"></i></div>
        <h2 id="currentTitle">選擇一首金曲吧！</h2>
        <p id="currentArtist">Anime JukeBox</p>

        <audio id="mainAudio">
            <source id="audioSource" src="" type="audio/mpeg">
        </audio>

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="mode-controls">
            <button class="mode-btn" id="shuffleBtn" title="隨機播放"><i class="fas fa-random"></i></button>
            <button class="mode-btn" id="repeatBtn" title="重複播放模式"><i class="fas fa-redo"></i></button>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" title="上一首"><i class="fas fa-backward"></i></button>
            <button class="play-pause-btn" id="playPauseBtn" title="播放/暫停"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn" id="nextBtn" title="下一首"><i class="fas fa-forward"></i></button>
        </div>

        <div class="playlist" id="playlist">
            </div>
        <div class="status-text" id="statusMsg">✨ 正在背景更新真實歌名...</div>
    </div>

    <script>
        // === 1. 音樂檔案路徑清單 ===
        const musicFiles = [
            'music/song1.mp3',
            'music/song2.mp3',
            'music/song3.mp3'
        ];

        // === 2. 瞬間秒開：先用檔名建立清單 ===
        let songList = musicFiles.map(file => {
            // 取出檔名，去掉 .mp3，例如 'music/song1.mp3' 變成 'song1'
            let defaultName = file.split('/').pop().replace('.mp3', '');
            return {
                title: defaultName,
                artist: '未知歌手',
                path: file
            };
        });

        const audio = document.getElementById('mainAudio');
        const source = document.getElementById('audioSource');
        const playlistContainer = document.getElementById('playlist');
        const titleDisplay = document.getElementById('currentTitle');
        const artistDisplay = document.getElementById('currentArtist');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playPauseIcon = playPauseBtn.querySelector('i');
        const statusMsg = document.getElementById('statusMsg');

        let currentSongIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0;

        // === 3. 初始化 UI (不用等下載，立刻顯示) ===
        function initPlaylist() {
            playlistContainer.innerHTML = ''; 
            songList.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.id = `track-${index}`; // 給每個項目一個 ID 方便之後更新
                item.innerHTML = `<span class="track-title">${song.title}</span>`;
                item.onclick = () => playSong(index);
                playlistContainer.appendChild(item);
            });
        }
        initPlaylist();

        // === 4. 背景非同步讀取標籤：慢慢把檔名替換成真名 ===
        function loadTagsInBackground() {
            const jsmediatags = window.jsmediatags;
            let loadedCount = 0;

            songList.forEach((song, index) => {
                jsmediatags.read(song.path, {
                    onSuccess: function(tag) {
                        const tags = tag.tags;
                        if(tags.title) song.title = tags.title;
                        if(tags.artist) song.artist = tags.artist;
                        
                        // 更新清單上的文字
                        const trackSpan = document.querySelector(`#track-${index} .track-title`);
                        if (trackSpan) trackSpan.innerText = song.title;

                        // 如果這首歌剛好正在播放，連上面的大標題一起更新
                        if (index === currentSongIndex && isPlaying) {
                            titleDisplay.innerText = song.title;
                            artistDisplay.innerText = song.artist;
                        }
                        
                        checkFinished();
                    },
                    onError: function(error) {
                        checkFinished(); // 就算失敗也算處理完畢
                    }
                });
            });

            function checkFinished() {
                loadedCount++;
                if (loadedCount === songList.length) {
                    statusMsg.innerText = "✅ 歌單資訊已全部更新完成！";
                    setTimeout(() => statusMsg.style.display = 'none', 3000); // 3秒後隱藏提示
                }
            }
        }
        
        // 啟動背景更新
        loadTagsInBackground();

        // === 下方是播放器核心邏輯 (不變) ===
        function updatePlaylistHighlight() {
            document.querySelectorAll('.track-item').forEach((item, index) => {
                if (index === currentSongIndex) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function loadSong(song) {
            source.src = song.path;
            titleDisplay.innerText = song.title;
            artistDisplay.innerText = song.artist;
            audio.load();
        }

        function playSong(index) {
            currentSongIndex = index;
            loadSong(songList[currentSongIndex]);
            updatePlaylistHighlight();
            playAudio();
        }

        function togglePlay() {
            if (source.src === "" || source.src.includes('music2/')) {
                playSong(0);
                return;
            }
            if (isPlaying) pauseAudio(); else playAudio();
        }

        function playAudio() { audio.play(); isPlaying = true; playPauseIcon.className = 'fas fa-pause'; }
        function pauseAudio() { audio.pause(); isPlaying = false; playPauseIcon.className = 'fas fa-play'; }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + songList.length) % songList.length;
            playSong(currentSongIndex);
        }

        function nextSong() {
            if (isShuffle) {
                let nextIndex;
                do { nextIndex = Math.floor(Math.random() * songList.length); } while (nextIndex === currentSongIndex && songList.length > 1);
                playSong(nextIndex);
            } else {
                currentSongIndex = (currentSongIndex + 1) % songList.length;
                playSong(currentSongIndex);
            }
        }

        function updateProgress(e) {
            const { duration, currentTime } = e.srcElement;
            if (duration) progress.style.width = `${(currentTime / duration) * 100}%`;
        }

        function setProgress(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuffleBtn').classList.toggle('active');
        }

        function cycleRepeatMode() {
            repeatMode = (repeatMode + 1) % 3;
            const btn = document.getElementById('repeatBtn');
            const icon = btn.querySelector('i');
            if(repeatMode === 0) { btn.classList.remove('active'); icon.className = 'fas fa-redo'; }
            else if(repeatMode === 1) { btn.classList.add('active'); icon.className = 'fas fa-redo-alt'; }
            else { btn.classList.add('active'); icon.className = 'fas fa-history'; }
        }

        function onAudioEnded() {
            if (repeatMode === 2) playAudio(); 
            else if (isShuffle) nextSong();
            else if (repeatMode === 1 || currentSongIndex < songList.length - 1) nextSong();
            else pauseAudio();
        }

        playPauseBtn.addEventListener('click', togglePlay);
        document.getElementById('prevBtn').addEventListener('click', prevSong);
        document.getElementById('nextBtn').addEventListener('click', nextSong);
        audio.addEventListener('timeupdate', updateProgress);
        document.getElementById('progressContainer').addEventListener('click', setProgress);
        audio.addEventListener('ended', onAudioEnded);
        document.getElementById('shuffleBtn').addEventListener('click', toggleShuffle);
        document.getElementById('repeatBtn').addEventListener('click', cycleRepeatMode);

    </script>
</body>
</html>
