<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森之迴響 🌿 - Miyazaki Fantasy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-bg: #FDFCEF;       
            --ghibli-green: #2E7D32;    
            --ghibli-leaf: #A5D6A7;     
            --ghibli-brown: #795548;    
            --ghibli-text: #4E342E;     
            --ghibli-sky: #81D4FA;      
            --shadow: 0 10px 20px rgba(121, 85, 72, 0.15); 
        }

        body {
            background-color: var(--ghibli-bg);
            color: var(--ghibli-text);
            font-family: 'Kosugi Maru', sans-serif, 'Microsoft JhengHei';
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
        }

        .player-card {
            background: white;
            padding: 30px;
            border-radius: 30px; 
            width: 320px; /* 稍微加寬一點點容納控制列 */
            text-align: center;
            box-shadow: var(--shadow);
            border: 8px solid #E0D7C6; 
            position: relative;
        }
        
        .player-card::before { content: '🌿'; position: absolute; top: -20px; left: 20px; font-size: 24px; }

        .album-art {
            width: 180px; height: 180px; background: #E8F5E9; 
            margin: 0 auto 25px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 90px; box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            color: var(--ghibli-green); border: 10px solid white;
        }

        h2 { margin: 10px 0 5px 0; font-size: 1.5rem; color: var(--ghibli-green); font-weight: normal; }
        p { color: #8D6E63; font-size: 0.9rem; margin-bottom: 25px; letter-spacing: 1px; }

        .progress-container {
            width: 100%; height: 8px; background: #E0E0E0; border-radius: 10px;
            cursor: pointer; margin-bottom: 25px; position: relative; overflow: hidden;
        }
        
        .progress { height: 100%; background-color: var(--ghibli-sky); border-radius: 10px; width: 0%; transition: width 0.1s linear; }

        .mode-controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .mode-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #D7CCC8; transition: 0.3s; }
        .mode-btn.active { color: var(--ghibli-leaf); text-shadow: 0 0 5px rgba(165, 214, 167, 0.5); }

        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 20px; }
        .ctrl-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--ghibli-brown); transition: 0.2s; }
        .ctrl-btn:hover { color: var(--ghibli-green); transform: scale(1.1); }

        .play-pause-btn {
            background-color: var(--ghibli-green); color: var(--ghibli-bg); border-radius: 50%;
            width: 60px; height: 60px; font-size: 28px; border: none; cursor: pointer;
            box-shadow: 0 6px 12px rgba(46, 125, 50, 0.3); display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .play-pause-btn:hover { background-color: #1B5E20; transform: translateY(-3px); }

        /* --- 新增：音量控制 --- */
        .volume-container {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 15px; color: #A1887F;
        }
        input[type=range] { -webkit-appearance: none; width: 60%; background: transparent; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer; background: #E0D7C6; border-radius: 5px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 14px; width: 14px; border-radius: 50%; background: var(--ghibli-green);
            cursor: pointer; -webkit-appearance: none; margin-top: -4px;
        }

        /* --- 新增：搜尋列 --- */
        .search-container { position: relative; margin-top: 20px; width: 100%; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #A1887F; }
        #searchInput {
            width: 100%; box-sizing: border-box; padding: 10px 15px 10px 40px;
            border-radius: 20px; border: 2px solid #E0D7C6; background-color: #FDFCEF;
            color: var(--ghibli-text); font-family: inherit; font-size: 0.9rem; outline: none; transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--ghibli-leaf); box-shadow: 0 0 8px rgba(165, 214, 167, 0.3); }

        .playlist { width: 100%; margin-top: 15px; text-align: center; border-top: 2px dashed #E0D7C6; padding-top: 15px; max-height: 160px; overflow-y: auto; }
        .playlist::-webkit-scrollbar { width: 4px; }
        .playlist::-webkit-scrollbar-thumb { background: #E0D7C6; border-radius: 10px; }
        .track-item {
            padding: 10px; border-radius: 15px; cursor: pointer; transition: 0.3s;
            color: #A1887F; font-size: 1.1rem; margin-bottom: 5px; letter-spacing: 2px; font-weight: bold;
        }
        .track-item:hover { background-color: #FDFCEF; color: var(--ghibli-brown); }
        .track-item.active { background-color: #E8F5E9; color: var(--ghibli-green); position: relative; }
        .track-item.active::before { content: '🍃'; position: absolute; left: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="album-art" id="albumArtIcon"><i class="fas fa-seedling"></i></div>
        <h2 id="currentTitle">森之音</h2>
        <p id="currentArtist">幻想飛行 JukeBox</p>

        <audio id="mainAudio">
            <source id="audioSource" src="" type="audio/mpeg">
        </audio>

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="mode-controls">
            <button class="mode-btn" id="shuffleBtn" title="隨機播放"><i class="fas fa-random"></i></button>
            <button class="mode-btn" id="repeatBtn" title="重複播放模式"><i class="fas fa-redo"></i></button>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" title="上一首"><i class="fas fa-backward"></i></button>
            <button class="play-pause-btn" id="playPauseBtn" title="播放/暫停"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn" id="nextBtn" title="下一首"><i class="fas fa-forward"></i></button>
        </div>

        <div class="volume-container">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            <i class="fas fa-volume-up"></i>
        </div>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="輸入編號或英文檔名找歌...">
        </div>

        <div class="playlist" id="playlist">
            </div>
    </div>

    <script>
        // === 1. 音樂檔案路徑 ===
        const musicFiles = [
            'music/song1.mp3',
            'music/song2.mp3',
            'music/song3.mp3'
        ];

        const songList = musicFiles.map((file, index) => {
            let trackNumber = (index + 1).toString().padStart(2, '0');
            return {
                title: `Track ${trackNumber}`, 
                listName: trackNumber,         
                path: file
            };
        });

        const audio = document.getElementById('mainAudio');
        const source = document.getElementById('audioSource');
        const playlistContainer = document.getElementById('playlist');
        const titleDisplay = document.getElementById('currentTitle');
        const artistDisplay = document.getElementById('currentArtist');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playPauseIcon = playPauseBtn.querySelector('i');
        const albumArtIcon = document.getElementById('albumArtIcon');
        
        // 新增的 DOM 元素
        const volumeSlider = document.getElementById('volumeSlider');
        const searchInput = document.getElementById('searchInput');

        let currentSongIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0;

        // 初始化音量
        audio.volume = volumeSlider.value;

        // 監聽音量改變
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // 監聽搜尋列輸入
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const trackItems = document.querySelectorAll('.track-item');
            
            trackItems.forEach((item, index) => {
                const song = songList[index];
                // 搜尋條件：編號(例如01) 或 路徑(包含英文檔名)
                const searchString = `${song.listName} ${song.path}`.toLowerCase();
                
                if (searchString.includes(searchTerm)) {
                    item.style.display = 'block'; // 顯示符合的歌
                } else {
                    item.style.display = 'none';  // 隱藏不符合的歌
                }
            });
        });

        function initPlaylist() {
            playlistContainer.innerHTML = ''; 
            songList.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.innerHTML = `<span>${song.listName}</span>`; 
                item.onclick = () => playSong(index);
                playlistContainer.appendChild(item);
            });
        }

        function updatePlaylistHighlight() {
            document.querySelectorAll('.track-item').forEach((item, index) => {
                if (index === currentSongIndex) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function loadSong(song) {
            source.src = song.path;
            titleDisplay.innerText = song.title; 
            
            const icons = ['fa-seedling', 'fa-cloud', 'fa-sun', 'fa-tree', 'fa-leaf'];
            const randomIcon = icons[currentSongIndex % icons.length];
            albumArtIcon.innerHTML = `<i class="fas ${randomIcon}"></i>`;
            
            audio.load();
        }

        function playSong(index) {
            currentSongIndex = index;
            loadSong(songList[currentSongIndex]);
            updatePlaylistHighlight();
            playAudio();
        }

        function togglePlay() {
            if (source.src === "" || source.src.includes('music2/')) {
                playSong(0);
                return;
            }
            if (isPlaying) pauseAudio(); else playAudio();
        }

        function playAudio() { audio.play(); isPlaying = true; playPauseIcon.className = 'fas fa-pause'; }
        function pauseAudio() { audio.pause(); isPlaying = false; playPauseIcon.className = 'fas fa-play'; }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + songList.length) % songList.length;
            playSong(currentSongIndex);
        }

        function nextSong() {
            if (isShuffle) {
                let nextIndex;
                do { nextIndex = Math.floor(Math.random() * songList.length); } while (nextIndex === currentSongIndex && songList.length > 1);
                playSong(nextIndex);
            } else {
                currentSongIndex = (currentSongIndex + 1) % songList.length;
                playSong(currentSongIndex);
            }
        }

        function updateProgress(e) {
            const { duration, currentTime } = e.srcElement;
            if (duration) {
                const progressPercent = (currentTime / duration) * 100;
                document.getElementById('progress').style.width = `${progressPercent}%`;
            }
        }

        function setProgress(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            document.getElementById('shuffleBtn').classList.toggle('active');
        }

        function cycleRepeatMode() {
            repeatMode = (repeatMode + 1) % 3;
            const btn = document.getElementById('repeatBtn');
            const icon = btn.querySelector('i');
            if(repeatMode === 0) { btn.classList.remove('active'); icon.className = 'fas fa-redo'; } 
            else if(repeatMode === 1) { btn.classList.add('active'); icon.className = 'fas fa-redo-alt'; } 
            else { btn.classList.add('active'); icon.className = 'fas fa-history'; } 
        }

        function onAudioEnded() {
            if (repeatMode === 2) playAudio(); 
            else if (isShuffle) nextSong();    
            else if (repeatMode === 1 || currentSongIndex < songList.length - 1) nextSong(); 
            else pauseAudio(); 
        }

        playPauseBtn.addEventListener('click', togglePlay);
        document.getElementById('prevBtn').addEventListener('click', prevSong);
        document.getElementById('nextBtn').addEventListener('click', nextSong);
        audio.addEventListener('timeupdate', updateProgress);
        document.getElementById('progressContainer').addEventListener('click', setProgress);
        audio.addEventListener('ended', onAudioEnded);
        document.getElementById('shuffleBtn').addEventListener('click', toggleShuffle);
        document.getElementById('repeatBtn').addEventListener('click', cycleRepeatMode);

        initPlaylist();
    </script>
</body>
</html>
