<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 音樂庫</title>
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-grey: #282828;
            --spotify-light-grey: #b3b3b3;
        }

        body {
            background-color: var(--spotify-black);
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .player-card {
            background: var(--spotify-grey);
            padding: 24px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .album-art {
            width: 200px;
            height: 200px;
            background: #444;
            margin: 0 auto 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        h2 { margin: 10px 0 5px 0; font-size: 1.2rem; }
        p { color: var(--spotify-light-grey); font-size: 0.9rem; margin-bottom: 20px; }

        audio {
            width: 100%;
            margin-bottom: 20px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); /* 讓預設播放器變亮色系 */
        }

        .playlist {
            width: 100%;
            margin-top: 20px;
            text-align: left;
        }

        .track-item {
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }

        .track-item:hover {
            background: #3e3e3e;
        }

        .track-item.active {
            color: var(--spotify-green);
        }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="album-art">🎵</div>
        <h2 id="currentTitle">請選擇歌曲</h2>
        <p id="currentArtist">GitHub Music Player</p>

        <audio id="mainAudio" controls>
            <source id="audioSource" src="" type="audio/mpeg">
        </audio>

        <div class="playlist">
            <div class="track-item" onclick="playSong('第一首歌', 'music/song1.mp3', this)">
                <span>01. 第一首歌</span>
                <span>3:45</span>
            </div>
            <div class="track-item" onclick="playSong('第二首歌', 'music/song2.mp3', this)">
                <span>02. 第二首歌</span>
                <span>4:12</span>
            </div>
            <div class="track-item" onclick="playSong('第三首歌', 'music/song3.mp3', this)">
                <span>03. 第三首歌</span>
                <span>2:58</span>
            </div>
        </div>
    </div>

    <script>
        function playSong(title, filePath, element) {
            const audio = document.getElementById('mainAudio');
            const source = document.getElementById('audioSource');
            const titleDisplay = document.getElementById('currentTitle');

            // 更新播放源與標題
            source.src = filePath;
            titleDisplay.innerText = title;

            // 重新載入並播放
            audio.load();
            audio.play();

            // 更新清單高亮樣式
            document.querySelectorAll('.track-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>

</body>
</html>
